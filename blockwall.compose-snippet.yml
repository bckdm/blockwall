blockwall:
    build: /root/blockwall
    image: blockwall:latest
    container_name: blockwall
    restart: unless-stopped
    env_file:
      - /root/blockwall/blockwall.env
    volumes:
      - /root/blockwall/data:/app/data
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"