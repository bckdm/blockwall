# Blockwall wallet — DeFi-style frontend served alongside automailer.
# Matches the existing automailer-nginx style: same TLS cert, same security headers.
# Server names below are placeholders. To make this the canonical entry point for
# kunden-blockchain.com once DNS is migrated to this VPS:
#   1. Add kunden-blockchain.com to the server_name lines below.
#   2. Reissue/repoint cert at /etc/nginx/certs/server.{crt,key} to include the new name.
#   3. docker exec automailer-nginx nginx -s reload

# ---- HTTP -> HTTPS redirect ----
server {
    listen 80;
    server_name wallet.kunden-blockchain.com _;

    # For now: same cert (self-signed, automailer-style). Replace with Let's Encrypt
    # once the real domain resolves here.
    return 301 https://$host$request_uri;
}

# ---- HTTPS entry ----
server {
    listen 443 ssl;
    http2 on;
    server_name wallet.kunden-blockchain.com;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 16M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets (templates served from blockwall container)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # All app traffic -> blockwall container on the automailer_default Docker network
    location / {
        proxy_pass http://blockwall:5001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}